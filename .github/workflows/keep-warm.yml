# Keeps the free-tier services awake so a visitor (e.g. a grader) never hits a
# cold start. Render sleeps a free web service after 15 min idle (~30-60s to
# wake); Neon suspends Postgres after 5 min idle (~15s to resume). We ping the
# health checks (wake Render) plus one DB-backed endpoint (wake Neon) every
# ~10 minutes.
#
# Note: this consumes free-tier instance/compute hours faster. Disable it
# (Actions tab -> this workflow -> "..." -> Disable) once grading is done.
name: keep-warm

on:
  schedule:
    - cron: "*/10 * * * *"   # every 10 minutes (GitHub may delay under load)
  workflow_dispatch: {}        # allow manual runs from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping services
        run: |
          CRM="https://brewhaus-crm.onrender.com"
          CHANNEL="https://brewhaus-channel.onrender.com"
          # -s silent, -m timeout (cold wake can take ~60s), keep going on failure
          curl -s -m 90 "$CRM/health" -o /dev/null -w "crm health: %{http_code} %{time_total}s\n" || true
          curl -s -m 90 "$CRM/customers/summary" -o /dev/null -w "crm db:     %{http_code} %{time_total}s\n" || true
          curl -s -m 90 "$CHANNEL/health" -o /dev/null -w "channel:    %{http_code} %{time_total}s\n" || true
